<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frontend Interview Prep — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            border: 'hsl(240 3.7% 15.9%)',
            input: 'hsl(240 3.7% 15.9%)',
            ring: 'hsl(240 4.9% 83.9%)',
            background: 'hsl(240 10% 3.9%)',
            foreground: 'hsl(0 0% 98%)',
            card: 'hsl(240 10% 3.9%)',
            'card-foreground': 'hsl(0 0% 98%)',
            primary: 'hsl(0 0% 98%)',
            'primary-foreground': 'hsl(240 5.9% 10%)',
            secondary: 'hsl(240 3.7% 15.9%)',
            'secondary-foreground': 'hsl(0 0% 98%)',
            muted: 'hsl(240 3.7% 15.9%)',
            'muted-foreground': 'hsl(240 5% 64.9%)',
            accent: 'hsl(240 3.7% 15.9%)',
            'accent-foreground': 'hsl(0 0% 98%)',
            destructive: 'hsl(0 62.8% 30.6%)',
            success: 'hsl(142 76% 36%)',
            'success-foreground': 'hsl(144 80% 90%)',

            lg: '0.5rem',
            md: 'calc(0.5rem - 2px)',

  <style>
    body { background: hsl(240 10% 3.9%); color: hsl(0 0% 98%); font-family: system-ui, -apple-system, sans-serif; font-size: 1.1rem; }
    .card { background: hsl(240 10% 5.5%); border: 1px solid hsl(240 3.7% 15.9%); border-radius: 0.75rem; }
    .badge { display: inline-flex; align-items: center; border-radius: 9999px; padding: 0.2rem 0.75rem; font-size: 0.85rem; font-weight: 600; }
    .badge-pass { background: hsl(142 76% 15%); color: hsl(142 76% 73%); border: 1px solid hsl(142 76% 25%); }
    .badge-fail { background: hsl(0 62.8% 15%); color: hsl(0 62.8% 70%); border: 1px solid hsl(0 62.8% 25%); }
    .badge-pending { background: hsl(40 80% 15%); color: hsl(40 80% 70%); border: 1px solid hsl(40 80% 25%); }
    .progress-bar { background: hsl(240 3.7% 15.9%); border-radius: 9999px; height: 8px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 9999px; transition: width 0.5s ease; }
    .progress-fill-green { background: hsl(142 76% 36%); }
    .progress-fill-blue { background: hsl(217 91% 60%); }
    .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .accordion-content.open { max-height: 5000px; }
    .accordion-trigger:hover { background: hsl(240 3.7% 10%); }
    .checkbox-custom { appearance: none; width: 1rem; height: 1rem; border: 2px solid hsl(240 5% 64.9%); border-radius: 3px; background: transparent; cursor: pointer; position: relative; flex-shrink: 0; }
    .checkbox-custom:checked { background: hsl(0 0% 98%); border-color: hsl(0 0% 98%); }
    .checkbox-custom:checked::after { content: '✓'; position: absolute; top: -2px; left: 1px; font-size: 11px; color: hsl(240 5.9% 10%); font-weight: bold; }
    .link-icon { opacity: 0.6; transition: opacity 0.15s; text-decoration: none; }
    .link-icon:hover { opacity: 1; }
    .test-detail { font-size: 0.875rem; }
    .test-pass::before { content: '✓'; color: hsl(142 76% 50%); margin-right: 4px; font-weight: bold; }
    .test-fail::before { content: '✗'; color: hsl(0 62.8% 55%); margin-right: 4px; font-weight: bold; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid hsl(240 3.7% 25%); border-top-color: hsl(0 0% 98%); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .reading-done { text-decoration: line-through; opacity: 0.5; }
  </style>
</head>

            links: [
              { type: 'read', label: 'javascript.info — Async/Await', url: 'https://javascript.info/async-await' },
              { type: 'video', label: 'Fireship — Async/Await in 100 Seconds', url: 'https://www.youtube.com/watch?v=vn3tm0quoqE' },
            ]
          },
          {
            id: 'mod6-fetch',
            name: 'Fetch API & HTTP Basics',
            desc: 'fetch() returns a promise. response.ok checks status. Fetch does NOT reject on 404/500 — only on network errors.',
            links: [
              { type: 'read', label: 'MDN — Fetch API', url: 'https://developer.mozilla.org/en-US/docs/Web/API/Fetch_API/Using_Fetch' },
            ]
          },
          {
            id: 'mod6-abort',
            name: 'AbortController & AbortSignal',
            desc: 'Creates a signal passed to fetch. Calling abort() cancels the request. Essential in React to cancel stale requests.',
            links: [
              { type: 'read', label: 'MDN — AbortController', url: 'https://developer.mozilla.org/en-US/docs/Web/API/AbortController' },
              { type: 'video', label: 'Web Dev Simplified — AbortController', url: 'https://www.youtube.com/watch?v=4mPkigmVsHs' },
            ]
          },
        ]
      },
      {
        id: 'mod7',
        num: 7,
        title: 'The "DOM Performance" Master',
        emoji: '🖼️',
        exercises: ['08-virtual-list'],
        concepts: [
          {
            id: 'mod7-rendering',
            name: 'Browser Rendering Pipeline',
            desc: 'DOM → CSSOM → Render Tree → Layout → Paint → Composite. Adding/removing many nodes forces expensive recalculations.',
            links: [
              { type: 'read', label: 'web.dev — How Browsers Work', url: 'https://web.dev/articles/howbrowserswork' },
              { type: 'video', label: 'Fireship — 10 Browser Concepts', url: 'https://www.youtube.com/watch?v=5-JBHoVlEco' },
            ]
          },
          {
            id: 'mod7-reflow',
            name: 'Reflow & Layout Thrashing',
            desc: 'Reading layout properties after writing forces synchronous reflow. Doing this in a loop is "layout thrashing."',
            links: [
              { type: 'read', label: 'web.dev — Avoid Layout Thrashing', url: 'https://web.dev/articles/avoid-large-complex-layouts-and-layout-thrashing' },
              { type: 'read', label: 'Paul Irish — What Forces Reflow', url: 'https://gist.github.com/paulirish/5d52fb081b3570c81e3a' },
            ]
          },
          {
            id: 'mod7-position',
            name: 'CSS position: absolute vs relative',
            desc: 'absolute removes from flow and positions relative to nearest positioned ancestor. Virtual lists use it for exact pixel offsets.',
            links: [
              { type: 'read', label: 'MDN — position', url: 'https://developer.mozilla.org/en-US/docs/Web/CSS/position' },
              { type: 'video', label: 'Web Dev Simplified — CSS Position', url: 'https://www.youtube.com/watch?v=jx5jmI0UlXU' },
            ]
          },
          {
            id: 'mod7-scroll',
            name: 'Scroll Events & scrollTop',
            desc: 'scroll event fires when scrolled. scrollTop gives pixels from top. Used to calculate visible items.',
            links: [
              { type: 'read', label: 'MDN — Element.scrollTop', url: 'https://developer.mozilla.org/en-US/docs/Web/API/Element/scrollTop' },
            ]
          },
          {
            id: 'mod7-vitals',
            name: 'Core Web Vitals (LCP, CLS, INP)',
            desc: 'LCP = load speed. CLS = visual stability. INP = responsiveness. 10,000 DOM nodes destroys all three.',
            links: [
              { type: 'read', label: 'web.dev — Core Web Vitals', url: 'https://web.dev/articles/vitals' },
              { type: 'video', label: 'Google — Core Web Vitals', url: 'https://www.youtube.com/watch?v=AQqFZ5t8uNc' },
            ]
          },
        ]
      },
      {
        id: 'mod8',
        num: 8,
        title: 'The "Data Fetching UI" Master',
        emoji: '🌍',
        exercises: ['09-autocomplete', '10-infinite-scroll'],
        concepts: [
          {
            id: 'mod8-controlled',
            name: 'Controlled Components',
            desc: 'An input whose value is driven by React state (value={query} + onChange). React has full control over form data.',
            links: [
              { type: 'read', label: 'React docs — Responding to Input with State', url: 'https://react.dev/learn/reacting-to-input-with-state' },
              { type: 'video', label: 'Web Dev Simplified — Controlled vs Uncontrolled', url: 'https://www.youtube.com/watch?v=IkMND33x0qQ' },
            ]
          },
          {
            id: 'mod8-race',
            name: 'Race Conditions & Stale Closures',
            desc: 'If rapid API calls resolve out of order, UI shows wrong results. isMounted flag or AbortController prevents stale updates.',
            links: [
              { type: 'read', label: 'React docs — Fetching Data in Effects', url: 'https://react.dev/learn/synchronizing-with-effects#fetching-data' },
              { type: 'video', label: 'Jack Herrington — Race Conditions', url: 'https://www.youtube.com/watch?v=T8TpiGp4xm0' },
            ]
          },
          {
            id: 'mod8-intersection',
            name: 'IntersectionObserver API',
            desc: 'Detects when an element enters/exits the viewport. Far more performant than scroll event listeners.',
            links: [
              { type: 'read', label: 'MDN — IntersectionObserver', url: 'https://developer.mozilla.org/en-US/docs/Web/API/Intersection_Observer_API' },
              { type: 'video', label: 'Web Dev Simplified — IntersectionObserver', url: 'https://www.youtube.com/watch?v=2IbRtjez6ag' },
            ]
          },
          {
            id: 'mod8-pagination',
            name: 'Pagination: Offset vs Cursor-based',
            desc: 'Offset (?page=2) is simple but fragile. Cursor-based (?after=abc123) is stable with live data.',
            links: [
              { type: 'read', label: 'Slack Engineering — Evolving API Pagination', url: 'https://slack.engineering/evolving-api-pagination-at-slack/' },
            ]
          },
          {
            id: 'mod8-usecallback',
            name: 'useCallback & Stable References',
            desc: 'Returns a memoized callback that only changes when deps change. Prevents unnecessary useEffect re-runs.',
            links: [
              { type: 'read', label: 'React docs — useCallback', url: 'https://react.dev/reference/react/useCallback' },
              { type: 'video', label: 'Jack Herrington — useMemo & useCallback', url: 'https://www.youtube.com/watch?v=MxIPQZ64x0I' },
            ]
          },
          {
            id: 'mod8-functional-state',
            name: 'Functional State Updates',
            desc: 'setState(prev => [...prev, ...new]) safely accesses previous state, avoiding stale closure bugs when appending data.',
            links: [
              { type: 'read', label: 'React docs — Updating state based on previous', url: 'https://react.dev/reference/react/useState#updating-state-based-on-the-previous-state' },
            ]
          },
        ]
      },
    ];

    // ═══════════════════════════
    // NOTES SLUG MAP — concept id → Docusaurus docs path
    // ═══════════════════════════
    const NOTES_MAP = {
      'mod1-closures': 'module-1/closures',
      'mod1-this': 'module-1/this-keyword',
      'mod1-timers': 'module-1/settimeout-cleartimeout',
      'mod1-eventloop': 'module-1/event-loop',
      'mod1-rest-spread': 'module-1/rest-spread',
      'mod1-useeffect': 'module-1/useeffect-cleanup',
      'mod1-custom-hooks': 'module-1/custom-hooks',
      'mod2-closures-cache': 'module-2/closures-caching',
      'mod2-map-weakmap': 'module-2/map-vs-weakmap',
      'mod2-referential': 'module-2/referential-equality',
      'mod2-hof': 'module-2/higher-order-functions',
      'mod2-useref': 'module-2/useref-vs-usestate',
      'mod3-observer': 'module-3/observer-pattern',
      'mod3-classes': 'module-3/javascript-classes',
      'mod3-map-set': 'module-3/map-and-set',
      'mod3-bubbling': 'module-3/event-bubbling',
      'mod3-memory': 'module-3/memory-leaks',
      'mod4-primitive-ref': 'module-4/primitive-vs-reference',
      'mod4-shallow-deep': 'module-4/shallow-vs-deep-copy',
      'mod4-recursion': 'module-4/recursion',
      'mod4-typeof': 'module-4/typeof-instanceof',
      'mod4-weakmap': 'module-4/weakmap-circular-refs',
      'mod4-json-limits': 'module-4/weakmap-circular-refs',
      'mod5-hof': 'module-5/higher-order-functions',
      'mod5-accumulator': 'module-5/accumulator-pattern',
      'mod5-prototype': 'module-5/prototype-chain',
      'mod5-arguments': 'module-5/arguments-object',
      'mod5-arity': 'module-5/function-arity',
      'mod5-currying': 'module-5/currying',
      'mod6-promises': 'module-6/promises',
      'mod6-resolve': 'module-6/promise-resolve',
      'mod6-microtask': 'module-6/microtask-vs-macrotask',
      'mod6-async-await': 'module-6/async-await',
      'mod6-fetch': 'module-6/fetch-api',
      'mod6-abort': 'module-6/abort-controller',
      'mod7-rendering': 'module-7/browser-rendering',
      'mod7-reflow': 'module-7/reflow-layout-thrashing',
      'mod7-position': 'module-7/css-position',
      'mod7-scroll': 'module-7/scroll-events',
      'mod7-vitals': 'module-7/core-web-vitals',
      'mod8-controlled': 'module-8/controlled-components',
      'mod8-race': 'module-8/race-conditions',
      'mod8-intersection': 'module-8/intersection-observer',
      'mod8-pagination': 'module-8/pagination',
      'mod8-usecallback': 'module-8/usecallback',
      'mod8-functional-state': 'module-8/functional-state-updates',
    };

    // ═══════════════════════════
    // STATE & PERSISTENCE
    // ═══════════════════════════
    const STORAGE_KEY = 'fip-reading-progress';
    let readingState = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    let testResults = null;
    let isRunningTests = false;

    function saveReadingState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(readingState));
      updateProgressBars();
    }

    function toggleReading(id) {
      readingState[id] = !readingState[id];
      saveReadingState();
      // Update the specific checkbox + label
      const cb = document.getElementById('cb-' + id);
      const label = document.getElementById('label-' + id);
      if (cb) cb.checked = !!readingState[id];
      if (label) label.classList.toggle('reading-done', !!readingState[id]);
    }

    // ═══════════════════════════
    // PROGRESS CALCULATIONS
    // ═══════════════════════════
    function getTotalReadingItems() {
      let total = 0;
      MODULES.forEach(m => m.concepts.forEach(c => c.links.forEach(() => total++)));
      return total;
    }

    function getCompletedReadingItems() {
      return Object.values(readingState).filter(Boolean).length;
    }

    function getPassingExercises() {
      if (!testResults?.exercises) return 0;
      return Object.values(testResults.exercises).filter(e => e.status === 'pass').length;
    }

    function updateProgressBars() {
      const totalReading = getTotalReadingItems();
      const doneReading = getCompletedReadingItems();
      document.getElementById('reading-count').textContent = doneReading;
      document.getElementById('reading-total').textContent = `/ ${totalReading} completed`;
      document.getElementById('reading-progress').style.width = totalReading ? `${(doneReading / totalReading) * 100}%` : '0%';

      const passing = getPassingExercises();
      document.getElementById('exercise-count').textContent = testResults ? passing : '—';
      document.getElementById('exercise-progress').style.width = `${(passing / 13) * 100}%`;

      // Update exercise badges in each module
      MODULES.forEach(m => {
        m.exercises.forEach(ex => {
          const badge = document.getElementById('badge-' + ex);
          if (!badge) return;
          if (!testResults?.exercises?.[ex]) {
            badge.className = 'badge badge-pending';
            badge.textContent = 'not run';
            return;
          }
          const r = testResults.exercises[ex];
          if (r.status === 'pass') {
            badge.className = 'badge badge-pass';
            badge.textContent = `✓ ${r.passed}/${r.total} passing`;
          } else {
            badge.className = 'badge badge-fail';
            badge.textContent = `✗ ${r.passed}/${r.total} passing`;
          }
        });
      });

      // Update test details
      MODULES.forEach(m => {
        m.exercises.forEach(ex => {
          const detail = document.getElementById('tests-' + ex);
          if (!detail || !testResults?.exercises?.[ex]) return;
          const r = testResults.exercises[ex];
          detail.innerHTML = r.tests.map(t =>
            `<div class="test-detail ${t.status === 'passed' ? 'test-pass' : 'test-fail'}">${escapeHtml(t.name)}</div>`
          ).join('');
        });
      });
    }

    // ═══════════════════════════
    // TEST RUNNER
    // ═══════════════════════════
    async function runTests() {
      if (isRunningTests) return;
      isRunningTests = true;
      const btn = document.getElementById('run-tests-btn');
      btn.innerHTML = '<span class="spinner"></span> Running...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/test-results');
        testResults = await res.json();
      } catch (err) {
        console.error('Failed to fetch test results:', err);
      }

      btn.innerHTML = '▶ Run Tests';
      btn.disabled = false;
      isRunningTests = false;
      updateProgressBars();
    }

    // ═══════════════════════════
    // RENDERING
    // ═══════════════════════════
    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderModules() {
      const container = document.getElementById('modules-container');
      container.innerHTML = MODULES.map(mod => {
        const exerciseBlocks = mod.exercises.map(ex => `
          <div class="flex items-center gap-2 mb-2">
            <a href="/exercise/${ex}" class="text-base font-mono text-blue-400 hover:text-blue-300 underline underline-offset-2">${ex}</a>
            <span id="badge-${ex}" class="badge badge-pending">not run</span>
          </div>
          <div id="tests-${ex}" class="ml-4 mb-3 space-y-0.5"></div>
        `).join('');

        const conceptBlocks = mod.concepts.map(c => {
          const linkItems = c.links.map(link => {
            const linkId = c.id + '-' + link.url.slice(-20).replace(/[^a-z0-9]/gi, '');
            const icon = link.type === 'video' ? '🎥' : '📖';
            const checked = readingState[linkId] ? 'checked' : '';
            const doneClass = readingState[linkId] ? 'reading-done' : '';
            return `
              <div class="flex items-center gap-2 py-0.5">
                <input type="checkbox" class="checkbox-custom" id="cb-${linkId}" ${checked}
                       onchange="toggleReading('${linkId}')" />
                <span id="label-${linkId}" class="text-base ${doneClass}">
                  ${icon}
                  <a href="${link.url}" target="_blank" rel="noopener" class="link-icon underline underline-offset-2 decoration-muted-foreground/40 hover:decoration-foreground">
                    ${escapeHtml(link.label)}
                  </a>
                </span>
              </div>
            `;
          }).join('');

          const noteSlug = NOTES_MAP[c.id];
          const noteLink = noteSlug
            ? ` <a href="http://localhost:3000/docs/${noteSlug}" target="_blank" rel="noopener" title="Open study notes" style="font-size:0.8rem;text-decoration:none;opacity:0.5;transition:opacity 0.15s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.5">📝</a>`
            : '';

          return `
            <div class="mb-4">
              <h4 class="text-base font-semibold text-foreground">${escapeHtml(c.name)}${noteLink}</h4>
              <p class="text-sm text-muted-foreground mt-0.5 mb-1.5 leading-relaxed">${escapeHtml(c.desc)}</p>
              ${linkItems}
            </div>
          `;
        }).join('');

        return `
          <div class="card">
            <button class="accordion-trigger w-full flex items-center justify-between p-4 rounded-t-xl text-left"
                    onclick="toggleModule('${mod.id}')">
              <div class="flex items-center gap-3">
                <span class="text-xl">${mod.emoji}</span>
                <div>
                  <span class="text-sm text-muted-foreground">Module ${mod.num}</span>
                  <h3 class="text-lg font-semibold -mt-0.5">${escapeHtml(mod.title)}</h3>
                </div>
              </div>
              <svg id="chevron-${mod.id}" class="w-5 h-5 text-muted-foreground transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>
            <div id="content-${mod.id}" class="accordion-content">
              <div class="px-4 pb-4 pt-2 border-t border-border">
                <div class="mb-4">
                  <h4 class="text-sm uppercase tracking-wider text-muted-foreground mb-2">Exercises</h4>
                  ${exerciseBlocks}
                </div>
                <div>
                  <h4 class="text-sm uppercase tracking-wider text-muted-foreground mb-3">📚 Prerequisites & Resources</h4>
                  ${conceptBlocks}
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function toggleModule(id) {
      const content = document.getElementById('content-' + id);
      const chevron = document.getElementById('chevron-' + id);
      content.classList.toggle('open');
      chevron.style.transform = content.classList.contains('open') ? 'rotate(180deg)' : '';
    }

    // ═══════════════════════════
    // INIT
    // ═══════════════════════════
    renderModules();
    updateProgressBars();
  </script>
</body>
</html>
